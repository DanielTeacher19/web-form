!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        form {
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f9f9f9;
        }
        input, select, textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 1px;
        }
        button {
            background: #28a745;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Sign Up</h2>

    <form action="https://script.google.com/macros/s/AKfycbzD5S-xprM4lUbRAiI1VM9k1C5tlt6dvj-_ml_x5m1SNJ8ARLwFoa64uH3TS1g86pf7/exec
" method="POST">
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required minlength="6">

            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="13" required>

            <label for="gender">Gender:</label>
            <select id="gender" name="gender">
                <option value="">Select...</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>

            <label for="bio">Short Bio:</label>
            <textarea id="bio" name="bio" rows="3" placeholder="Tell us about yourself..."></textarea>

            <label for="terms">
                <input type="checkbox" id="terms" name="terms" required> I agree to the Terms & Conditions
            </label>

            <button type="submit">Sign Up</button>
        </fieldset>
    </form>

</body>
</html>
